name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  # Run on every push so feature branches get CI without opening a PR.
  push:
  # Also run when a PR targets main (e.g. forks / required checks).
  pull_request:
    branches: ["main"]
  # Actions tab → "Run workflow" to rerun without a new commit.
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t rebrowser-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t rebrowser-frontend:ci ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebrowser-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          # Faster CI: only CVE scanning (skip secret/config/license scanners).
          scanners: vuln

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebrowser-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln

      # Publish only from default branch (push to main, or "Run workflow" on main).
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag rebrowser-backend:ci ghcr.io/${OWNER}/rebrowser-backend:latest
          docker tag rebrowser-backend:ci ghcr.io/${OWNER}/rebrowser-backend:sha-${{ github.sha }}
          docker push ghcr.io/${OWNER}/rebrowser-backend:latest
          docker push ghcr.io/${OWNER}/rebrowser-backend:sha-${{ github.sha }}

      - name: Push frontend image to GHCR
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag rebrowser-frontend:ci ghcr.io/${OWNER}/rebrowser-frontend:latest
          docker tag rebrowser-frontend:ci ghcr.io/${OWNER}/rebrowser-frontend:sha-${{ github.sha }}
          docker push ghcr.io/${OWNER}/rebrowser-frontend:latest
          docker push ghcr.io/${OWNER}/rebrowser-frontend:sha-${{ github.sha }}

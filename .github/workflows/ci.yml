name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t rebrowser-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t rebrowser-frontend:ci ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebrowser-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rebrowser-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag rebrowser-backend:ci ghcr.io/${{ github.repository_owner }}/rebrowser-backend:latest
          docker tag rebrowser-backend:ci ghcr.io/${{ github.repository_owner }}/rebrowser-backend:sha-${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/rebrowser-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/rebrowser-backend:sha-${{ github.sha }}

      - name: Push frontend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag rebrowser-frontend:ci ghcr.io/${{ github.repository_owner }}/rebrowser-frontend:latest
          docker tag rebrowser-frontend:ci ghcr.io/${{ github.repository_owner }}/rebrowser-frontend:sha-${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/rebrowser-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/rebrowser-frontend:sha-${{ github.sha }}

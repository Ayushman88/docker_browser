name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rebrowser-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Extract metadata for frontend image
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rebrowser-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          tags: |
            rebrowser-backend:ci
            ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          tags: |
            rebrowser-frontend:ci
            ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rebrowser-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rebrowser-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
